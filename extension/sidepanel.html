<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usability Pipeline</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --bg2: #13131f;
      --bg3: #1a1a2e;
      --border: #2a2a45;
      --text: #e0e0f0;
      --muted: #888899;
      --accent: #7c6fff;
      --accent2: #4fc3f7;
      --elderly: #ffd700;
      --adhd: #ff88aa;
      --nonnative: #88ccff;
      --pipeline: #a0a8c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: linear-gradient(135deg, #1a1040 0%, #0d0d1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px 8px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; color: #fff; }
    header .url { color: var(--accent2); font-size: 0.75rem; margin-top: 2px; word-break: break-all; }
    .ws-status {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 5px;
      vertical-align: middle;
    }
    .ws-status.connected { background: #44dd88; }
    .ws-status.error { background: #ff4444; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ws-label { color: var(--muted); font-size: 0.72rem; }

    /* Progress bar */
    .progress-section { padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .progress-label { color: var(--muted); font-size: 0.72rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .progress-bar-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; width: 0%; }

    /* Persona cards */
    .personas { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .persona-card {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center;
    }
    .persona-card .p-name { font-size: 0.7rem; font-weight: 600; margin-bottom: 3px; }
    .persona-card .p-icon { font-size: 1.1rem; margin-bottom: 2px; }
    .persona-card .p-score { font-size: 0.7rem; color: var(--muted); }
    .persona-card .p-status { font-size: 0.65rem; margin-top: 2px; }
    .persona-card.active { border-color: rgba(124,111,255,0.5); background: rgba(124,111,255,0.07); }

    /* Friction count */
    .friction-bar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .friction-label { color: var(--muted); font-size: 0.72rem; }
    .friction-count { font-weight: 700; font-size: 0.85rem; color: #ff8800; }
    .friction-latest { color: var(--text); font-size: 0.72rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Log */
    .log-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .log-header { padding: 6px 12px 4px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .log-header span { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .log-clear { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 3px; padding: 1px 6px; font-size: 0.65rem; cursor: pointer; }
    .log-clear:hover { color: #fff; border-color: #555; }
    .log-container {
      flex: 1;
      overflow-y: auto;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.72rem;
      padding: 0 4px 8px;
    }
    .log-entry {
      display: flex;
      gap: 5px;
      padding: 2px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      line-height: 1.4;
      align-items: flex-start;
    }
    .log-entry:hover { background: rgba(255,255,255,0.02); }
    .log-ts { color: var(--muted); flex-shrink: 0; min-width: 62px; }
    .log-persona { font-weight: 600; flex-shrink: 0; min-width: 100px; }
    .log-msg { flex: 1; word-break: break-word; }
    .log-pass { color: #44dd88; }
    .log-fail { color: #ff4444; }

    .empty-state { color: var(--muted); text-align: center; padding: 2rem; font-size: 0.8rem; line-height: 1.7; }

    /* Done banner */
    .done-banner { display: none; background: rgba(68,221,136,0.12); border-top: 1px solid rgba(68,221,136,0.3); padding: 8px 12px; text-align: center; color: #44dd88; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
    .done-banner a { color: var(--accent2); }
  </style>
</head>
<body>
  <header>
    <h1>
      <span class="ws-status" id="ws-dot"></span>
      Usability Pipeline
    </h1>
    <div class="url" id="url-display">Waiting for pipeline…</div>
    <div class="ws-label" id="ws-label">Connecting to ws://localhost:7655…</div>
  </header>

  <div class="progress-section">
    <div class="progress-label">
      <span id="progress-label-text">No pipeline running</span>
      <span id="progress-fraction"></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div class="personas">
    <div class="persona-card" id="card-elderly_user">
      <div class="p-icon">👴</div>
      <div class="p-name" style="color:#ffd700;">Elderly</div>
      <div class="p-score" id="score-elderly_user">—</div>
      <div class="p-status" id="status-elderly_user"></div>
    </div>
    <div class="persona-card" id="card-adhd_user">
      <div class="p-icon">⚡</div>
      <div class="p-name" style="color:#ff88aa;">ADHD</div>
      <div class="p-score" id="score-adhd_user">—</div>
      <div class="p-status" id="status-adhd_user"></div>
    </div>
    <div class="persona-card" id="card-non_native_english">
      <div class="p-icon">🌐</div>
      <div class="p-name" style="color:#88ccff;">Non-Native</div>
      <div class="p-score" id="score-non_native_english">—</div>
      <div class="p-status" id="status-non_native_english"></div>
    </div>
  </div>

  <div class="friction-bar">
    <span class="friction-label">Friction points:</span>
    <span class="friction-count" id="friction-count">0</span>
    <span class="friction-latest" id="friction-latest">none yet</span>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>Live Log</span>
      <button class="log-clear" id="clear-btn">Clear</button>
    </div>
    <div class="log-container" id="log-container">
      <div class="empty-state" id="empty-state">
        Waiting for pipeline to start…<br>
        Run <code>python main.py &lt;url&gt;</code><br>to begin.
      </div>
    </div>
  </div>

  <div class="done-banner" id="done-banner">
    Pipeline complete — <a id="report-link" href="http://localhost:7654/report.html" target="_blank">view full report</a>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
